discord_bot:
  token: "USE_ENV"

moderation:
  enabled: true

  # Channels where reactions are allowed
  browse_channel_id: 1477779947903778878
  best_channel_id: 1477727866803195994
  saved_channel_id: 1477839218284953610

  save_emoji: "✅"
  dismiss_emoji: "❌"
scan:
  interval_minutes: 10

  # ALERT WINDOW (instant notifications only)
  ending_soon_minutes: 120         # 2 hours

  # DIGEST/BROWSE WINDOW (collect items that are "coming up")
  digest_window_minutes: 360       # 6 hours

  # Filters
  max_bids: 10
  max_shipping_usd: 45

  # Alert volume control (BEST channel uses this cap)
  max_alerts_per_scan: 5
  max_alerts_per_hour: 999999      # effectively OFF while testing

  # Enrich top listings via detail endpoint (for better time/shipping)
  enrich_top_n: 20

  # Helps reduce random SGW API errors
  request_delay_seconds: 0.6
  use_buyer_prefs: false

  # Scoring threshold (items below this are ignored entirely)
  tiers:
    tier_b_min_score: 40
    digest_every_minutes: 60

  # NEW: BEST vs BROWSE behavior knobs
  best_min_score: 70               # BEST channel only (raise = fewer, lower = more)
  browse_max_posts_per_scan: 25    # how many silent browse hits to post each scan

  digest_max_items: 20
  debug_time: false


feeds:
  # ----------------------------
  # CORE (high-signal, consistent)
  # ----------------------------
  - name: "Video game lots"
    query: "video game lot"
  - name: "Console untested"
    query: "console untested"
  - name: "Controller lots"
    query: "controller lot"
  - name: "DVD lots"
