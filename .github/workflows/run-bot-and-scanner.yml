name: Run Bot and Scanner

on:
  workflow_dispatch:

jobs:
  run-bot-and-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    defaults:
      run:
        working-directory: goodwill_scanner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: nohup python bot.py > bot.log 2>&1 &

      - name: Start scanner
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: nohup python scanner.py > scanner.log 2>&1 &

      - name: Keep workflow alive
        run: sleep 21600
